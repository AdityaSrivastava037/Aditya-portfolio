<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Timing Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080808; color: #fff; font-family: 'Poppins', sans-serif; padding: 40px 20px; }
        h1 { text-align: center; margin-bottom: 50px; font-size: 24px; color: #ababab; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 14px; padding: 40px 30px; text-align: center; }
        .card-label { font-size: 13px; color: #ababab; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px; }
        .name { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        .name span { color: #ff004f; }
        .role { font-size: 26px; font-weight: 600; color: #ff004f; min-height: 40px; }
        .role.glitching { animation: glitch 0.4s steps(1) forwards; }
        @keyframes glitch {
            0%   { text-shadow:  2px 0 #0ff, -2px 0 #f0f; transform: skewX(-5deg); }
            20%  { text-shadow: -2px 0 #0ff,  2px 0 #f0f; transform: skewX(5deg); }
            40%  { text-shadow:  2px 0 #f0f, -2px 0 #0ff; transform: skewX(-3deg); }
            60%  { text-shadow: -1px 0 #0ff,  1px 0 #f0f; transform: skewX(3deg); }
            80%  { text-shadow:  1px 0 #f0f, -1px 0 #0ff; transform: skewX(-1deg); }
            100% { text-shadow: none; transform: skewX(0); }
        }
    </style>
</head>
<body>
    <h1>Glitch Timing — Pick your favourite</h1>
    <div class="grid">
        <div class="card">
            <div class="card-label">1 second pause</div>
            <div class="name">Hi, I'm <span>Aditya</span></div>
            <div class="role" id="g1"></div>
        </div>
        <div class="card">
            <div class="card-label">1.5 second pause</div>
            <div class="name">Hi, I'm <span>Aditya</span></div>
            <div class="role" id="g2"></div>
        </div>
        <div class="card">
            <div class="card-label">2 second pause</div>
            <div class="name">Hi, I'm <span>Aditya</span></div>
            <div class="role" id="g3"></div>
        </div>
    </div>

    <script>
        const roles = ["DevOps Engineer", "Cloud Engineer"];
        const glitchChars = "!@#$%^&*<>?/|";

        function makeGlitch(elId, pauseMs) {
            const el = document.getElementById(elId);
            let idx = 0;

            function scramble(target, cb) {
                let iter = 0;
                const interval = setInterval(() => {
                    el.textContent = target.split("").map((c, i) =>
                        i < iter ? c : glitchChars[Math.floor(Math.random() * glitchChars.length)]
                    ).join("");
                    el.classList.add("glitching");
                    if (iter >= target.length) {
                        clearInterval(interval);
                        el.textContent = target;
                        el.classList.remove("glitching");
                        cb && cb();
                    }
                    iter++;
                }, 40);
            }

            function cycle() {
                idx = (idx + 1) % roles.length;
                scramble(roles[idx], () => setTimeout(cycle, pauseMs));
            }

            scramble(roles[0], () => setTimeout(cycle, pauseMs));
        }

        makeGlitch("g1", 1000);
        makeGlitch("g2", 1500);
        makeGlitch("g3", 2000);
    </script>
</body>
</html>
